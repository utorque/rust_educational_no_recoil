name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '3.28.0'

      - name: Configure
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Rename artifact
        run: |
          copy build\Release\CursorCompensation.exe CursorCompensation-windows-x64.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CursorCompensation-windows-x64
          path: CursorCompensation-windows-x64.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CursorCompensation-windows-x64.exe
          generate_release_notes: true
          name: "Cursor Compensation System ${{ github.ref_name }}"
          body: |
            ## Cursor Compensation System ${{ github.ref_name }}

            ### Installation
            1. Download `CursorCompensation-windows-x64.exe`
            2. Place it in any folder (it stores `profiles/`, `macros/`, and `settings.json` next to the executable)
            3. Run it — no installer required

            ### Requirements
            - Windows 10/11 x64
            - DirectX 11 (included with Windows)
